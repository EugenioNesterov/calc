<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Big City HVAC Quote Calculator</title>
    <meta name="description" content="Get an instant HVAC replacement quote in under 60 seconds." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                blue: "#0e2a47",   
                light: "#1a497d",  
                red: "#ff6b00",    /* Оранжевый цвет для всех акцентов, кнопок и прогресс-бара */
                redHover: "#e66000",
                gray: "#f4f6f9",   
              },
            },
            fontFamily: {
              sans:    ["Inter", "sans-serif"],
              display: ["Montserrat", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      /* ─── Анимации ─── */
      @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes scaleIn { from { opacity: 0; transform: scale(0.94); } to { opacity: 1; transform: scale(1); } }

      .anim-slide-right { animation: slideInRight 0.3s ease-out both; }
      .anim-slide-left  { animation: slideInLeft  0.3s ease-out both; }
      .anim-fade-up     { animation: fadeUp       0.3s ease-out both; }
      .anim-scale-in    { animation: scaleIn      0.3s ease-out both; }

      .anim-child > *:nth-child(1)  { animation-delay: 0ms;   }
      .anim-child > *:nth-child(2)  { animation-delay: 50ms;  }
      .anim-child > *:nth-child(3)  { animation-delay: 100ms; }
      .anim-child > *:nth-child(4)  { animation-delay: 150ms; }
      .anim-child > *:nth-child(5)  { animation-delay: 200ms; }
      .anim-child > *:nth-child(6)  { animation-delay: 250ms; }

      /* ─── Базовые стили карточки (общие для всех вариантов) ─── */
      .option-card {
        display: flex;
        border-radius: 0.5rem;
        border: 2px solid #cbd5e1;
        background: #fff;
        cursor: pointer;
        transition: border-color .15s ease-in-out,
                    background .15s ease-in-out,
                    transform .15s ease-in-out,
                    box-shadow .15s ease-in-out;
        box-shadow: 0 2px 6px rgba(0,0,0,0.04);
      }
      .option-card:hover {
        border-color: #1a497d;
        background: #f8fafc;
        transform: translateY(-3px);
        box-shadow: 0 6px 14px rgba(0,0,0,0.08);
      }
      .option-card.selected {
        border-color: #0e2a47;
        background: #e8f0f8;
        box-shadow: 0 0 0 3px rgba(14,42,71,0.12);
      }

      /* ─── Вертикальный вариант: квадратные карточки в сетке ─── */
      .option-card.vertical {
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.25rem;
        min-height: 10rem;
        padding: 1.5rem 1rem;
        text-align: center;
      }
      .option-card.vertical .label {
        font-size: 0.8125rem;
        font-weight: 700;
        color: #0e2a47;
        line-height: 1.3;
        word-break: break-word;
        hyphens: auto;
      }
      .option-card.vertical .check-icon {
        flex-shrink: 0;
        color: #ff6b00;
        width: 1.125rem;
        height: 1.125rem;
      }
      .option-card.vertical .check-placeholder {
        display: none;
      }

      /* ─── Горизонтальный вариант: полноширинные строки ─── */
      .option-card.horizontal {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        padding: 1.25rem 1.5rem;
        text-align: left;
      }
      .option-card.horizontal .label {
        font-size: 1.125rem;
        font-weight: 700;
        color: #0e2a47;
      }
      .option-card.horizontal .check-icon {
        flex-shrink: 0;
        color: #ff6b00;
        width: 1.25rem;
        height: 1.25rem;
      }
      .option-card.horizontal .check-placeholder {
        width: 1.25rem;
        height: 1.25rem;
        flex-shrink: 0;
      }

      /* ─── Инпуты ─── */
      .tf-input {
        width: 100%;
        border: 2px solid #cbd5e1;
        border-radius: 0.375rem;
        background: #fff;
        padding: 1rem 1.25rem;
        font-size: 1.25rem;
        font-weight: 700;
        color: #0e2a47;
        outline: none;
        transition: border-color .2s;
      }
      .tf-input::placeholder { color: #94a3b8; font-weight: 500; font-size: 1.15rem; }
      .tf-input:focus { border-color: #0e2a47; box-shadow: 0 0 0 3px rgba(14,42,71,0.1); }

      #progressFill { transition: width .4s ease; }

      /* ─── Стили результатов ─── */
      .result-label {
        display: block;
        font-size: .75rem;
        font-weight: 800;
        letter-spacing: .05em;
        text-transform: uppercase;
        color: #64748b;
        margin-bottom: .25rem;
      }
      .result-value {
        font-size: 1.125rem;
        font-weight: 800;
        color: #0e2a47;
      }

      /* ─── Главная кнопка OK ─── */
      .step-next-btn {
        display: inline-flex;
        align-items: center;
        gap: .5rem;
        background: #ff6b00;
        color: #fff;
        border: none;
        border-radius: 0.375rem;
        padding: 0.875rem 3rem;
        font-size: 1rem;
        font-weight: 800;
        text-transform: uppercase;
        cursor: pointer;
        transition: all .15s;
        box-shadow: 0 4px 10px rgba(255, 107, 0, 0.3);
      }
      .step-next-btn:hover:not(:disabled) { background: #e66000; transform: translateY(-1px); box-shadow: 0 6px 14px rgba(255, 107, 0, 0.4); }
      .step-next-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
      .step-next-btn:focus-visible { outline: 3px solid #fdba74; outline-offset: 3px; }

      @keyframes pulse-ring {
        0%   { transform: scale(.85); box-shadow: 0 0 0 0 rgba(255, 107, 0, .6); }
        70%  { transform: scale(1);  box-shadow: 0 0 0 10px rgba(255, 107, 0, 0); }
        100% { transform: scale(.85); box-shadow: 0 0 0 0 rgba(255, 107, 0, 0); }
      }
      .pulse-dot { animation: pulse-ring 2s infinite; }
      
      .step-content { -ms-overflow-style: none; scrollbar-width: none; }
      .step-content::-webkit-scrollbar { display: none; }

      /* ─── Marquee (бегущая строка партнёров) ─── */
      @keyframes marquee {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
      }

      .marquee-track {
        display: flex;
        gap: 1.5rem;           /* gap-6 = 24px */
        width: max-content;    /* растягивается под 30 логотипов */
        animation: marquee 35s linear infinite;
        will-change: transform;
      }

      /* Пауза при наведении мыши */
      .marquee-wrapper:hover .marquee-track {
        animation-play-state: paused;
      }
    </style>
  </head>

      <main id="stepContainer" class="flex flex-1 flex-col items-center justify-center px-5 py-12 sm:px-8">
